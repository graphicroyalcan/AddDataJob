<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AC369 - Work Record System</title>
    <style>
        /* ลบ margin/padding เพื่อให้แสดงผลเต็มหน้าจอ */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* ป้องกัน scrollbar ซ้อนกัน */
            background-color: #f0f2f5; /* สีพื้นหลังระหว่างรอโหลด */
        }

        /* ตั้งค่า iframe ให้เต็มพื้นที่จอ */
        .tv-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ตกแต่ง Loading เล็กน้อยระหว่างรอ Apps Script ตอบสนอง */
        .loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #0d6efd;
            z-index: -1; /* อยู่หลัง iframe */
        }
    </style>
</head>
<body>

    <div class="loading-text">กำลังโหลดระบบ...</div>

    <iframe 
        /* แก้ไข: เติม ?page=Main ต่อท้าย URL เพื่อบังคับหน้าเริ่มต้น */
        src="https://script.google.com/macros/s/AKfycbxviILQMsSIRed8cVpaDIhXFtIFCzxRSGxQfOYd5hh5Je0_LqGv4XMqHmtK4GFNkngPsQ/exec?page=Main" 
        class="tv-frame"
        /* ส่วนประกอบสำคัญ: อนุญาต Clipboard และฟีเจอร์อื่นๆ */
        allow="autoplay; fullscreen; picture-in-picture; clipboard-read; clipboard-write"
        allowfullscreen>
    </iframe>

</body>
</html>
